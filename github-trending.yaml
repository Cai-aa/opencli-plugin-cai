site: github-trending
name: trending
description: GitHub Trending repos (public API, last 7 days by stars)
domain: github.com
strategy: public
browser: false

args:
  lang:
    required: false
    positional: true
    help: Language (e.g. rust, typescript, python, go)
  limit:
    type: int
    default: 25
    description: Number of results

pipeline:
  - fetch:
      url: https://api.github.com/search/repositories
      params:
        q: >-
          created:>2026-03-17 language:${{ args.lang || '*' }}
        sort: stars
        order: desc
        per_page: ${{ args.limit | default(25) }}
      headers:
        Accept: application/vnd.github.v3+json
        User-Agent: opencli

  - select: items

  - map:
      rank: ${{ index + 1 }}
      repo: ${{ item.full_name }}
      description: ${{ item.description }}
      stars: ${{ item.stargazers_count }}
      forks: ${{ item.forks_count }}
      lang: ${{ item.language || '-' }}
      today: ${{ item.pushed_at?.slice(0, 10) }}
      url: ${{ item.html_url }}

  - limit: ${{ args.limit }}

columns: [rank, repo, stars, lang, description]
